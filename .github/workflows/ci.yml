name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  admin:
    name: Admin (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: admin/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
        env:
          # Real values are injected in the deploy env; build tolerates absence.
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder

  schemas:
    name: Shared schemas (JSON valid)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate every exercise schema parses
        run: |
          for f in shared/schemas/*.schema.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8')); console.log('ok: $f')"
          done

  functions:
    name: Edge Functions (type-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type-check every Edge Function
        working-directory: supabase/functions
        run: |
          for f in */index.ts; do
            echo "deno check $f"
            deno check "$f"
          done

  supabase:
    name: Supabase (migrations + seed reset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          # Pin the version: "latest" resolves via the unauthenticated GitHub
          # API and hits the rate limit on shared runners.
          version: 2.105.0
      - name: Start local stack and apply migrations + seed
        working-directory: supabase
        run: |
          supabase start
          supabase db reset

  ios:
    name: iOS (xcodegen + build)
    # macos-15 ships Xcode 16.x, which can read the project format (77) that the
    # locally-installed XcodeGen emits. macos-14's default Xcode 15.4 cannot.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        working-directory: ios/MediLingo
        run: xcodegen generate
      - name: Build
        working-directory: ios/MediLingo
        run: |
          xcodebuild -scheme MediLingo \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            build
