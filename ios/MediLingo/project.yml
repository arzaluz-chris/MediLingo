name: MediLingo

options:
  bundleIdPrefix: com.medilingo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    # Swift 5 language mode for Phase 0. Spec targets Swift 6 strict concurrency
    # "when stable" — flip SWIFT_VERSION to 6.0 once services adopt full isolation.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

# SPM dependencies (CLAUDE-ios.md § Third-Party Dependencies).
# First `xcodegen generate` + build resolves these — needs network.
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  Lottie:
    url: https://github.com/airbnb/lottie-spm
    from: "4.4.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  MediLingo:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Core
      - path: DesignSystem
      - path: Features
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.christian-arzaluz.MediLingo
        PRODUCT_NAME: MediLingo
        # Persist signing across `xcodegen generate` (Xcode was dropping it each regen).
        DEVELOPMENT_TEAM: WQCQ3T6U7T
        CODE_SIGN_STYLE: Automatic
    # Explicit generated Info.plist so we can register the OAuth callback URL
    # scheme (com.christian-arzaluz.MediLingo://) that Google sign-in redirects back through.
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: MediLingo
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSSpeechRecognitionUsageDescription: "MediLingo uses speech recognition to evaluate your medical English pronunciation."
        NSMicrophoneUsageDescription: "MediLingo needs microphone access to practice speaking medical English."
        # Hosted MediLingo project. The anon key is public (client-shippable,
        # protected by RLS) — safe to commit. AppConfig reads these Info keys.
        SupabaseURL: "https://qjixyztcwqcfdgixdfla.supabase.co"
        SupabaseAnonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqaXh5enRjd3FjZmRnaXhkZmxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDQ2MTcsImV4cCI6MjA5ODkyMDYxN30.9FfxXdeMyoqWpnePRM5uRoSRrV59JdZjAPqhynm4W2Y"
        # Analytics / subscriptions keys. `$(VAR)` expands to "" when the build
        # setting is unset (define it in Secrets.xcconfig), so the matching
        # service stays a safe no-op until a real key is provided.
        RevenueCatAPIKey: "$(REVENUE_CAT_API_KEY)"
        PostHogAPIKey: "$(POSTHOG_API_KEY)"
        PostHogHost: "$(POSTHOG_HOST)"
        # Remote push: lets APNs-delivered content wake the app.
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLName: com.christian-arzaluz.MediLingo
            CFBundleURLSchemes:
              - com.christian-arzaluz.MediLingo
    entitlements:
      path: MediLingo.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        # Remote push. `development` for dev/TestFlight-via-Xcode; the App Store
        # build is remapped to `production` by the Push Notifications capability.
        aps-environment: development
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: Lottie
        product: Lottie
      - package: PostHog
        product: PostHog
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics

schemes:
  MediLingo:
    build:
      targets:
        MediLingo: all
    run:
      config: Debug
      # Local StoreKit testing without App Store Connect.
      storeKitConfiguration: Resources/Products.storekit
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
