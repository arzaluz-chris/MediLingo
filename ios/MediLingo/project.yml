name: MediLingo

options:
  bundleIdPrefix: com.medilingo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    # Swift 5 language mode for Phase 0. Spec targets Swift 6 strict concurrency
    # "when stable" — flip SWIFT_VERSION to 6.0 once services adopt full isolation.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

# SPM dependencies (CLAUDE-ios.md § Third-Party Dependencies).
# First `xcodegen generate` + build resolves these — needs network.
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  Lottie:
    url: https://github.com/airbnb/lottie-spm
    from: "4.4.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  MediLingo:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Core
      - path: DesignSystem
      - path: Features
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medilingo.app
        PRODUCT_NAME: MediLingo
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: MediLingo
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "MediLingo uses speech recognition to evaluate your medical English pronunciation."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MediLingo needs microphone access to practice speaking medical English."
        # Provide real values via Resources/Secrets.xcconfig (see .example). AppConfig reads these Info keys.
        INFOPLIST_KEY_SupabaseURL: "$(SUPABASE_URL)"
        INFOPLIST_KEY_SupabaseAnonKey: "$(SUPABASE_ANON_KEY)"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: Lottie
        product: Lottie
      - package: PostHog
        product: PostHog
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
